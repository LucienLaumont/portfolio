<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lucien Laumont — Ingénieur Data Science & IA</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml"/>

  <script>
    // Cache-busting automatique : un nouveau numéro de version est généré à chaque
    // chargement de page, ce qui force le navigateur à retélécharger CSS et JSX.
    // Les CDN (react, babel, lucide) sont déjà versionnés dans leurs URLs — aucune action requise.
    window.__v = Date.now();
    document.write('<link rel="stylesheet" href="kit.css?v=' + window.__v + '"/>');
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    [
      'components.jsx','Nav.jsx','Hero.jsx','Projects.jsx','Experiences.jsx',
      'Formation.jsx','Skills.jsx','Associatif.jsx','About.jsx','Contact.jsx',
      'Footer.jsx','Tweaks.jsx','app.jsx'
    ].forEach(function(f) {
      document.write('<script type="text/babel" src="' + f + '?v=' + window.__v + '"><\/script>');
    });
  </script>
</body>
</html>
